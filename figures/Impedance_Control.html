<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阻抗控制与柔顺控制</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a2e; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            max-width: 350px;
            pointer-events: none;
        }
        h1 { margin: 0 0 10px 0; font-size: 20px; color: #333; }
        .formula {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            margin: 10px 0;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 450px;
        }
        .control-group { display: flex; align-items: center; gap: 15px; }
        .control-label { font-weight: 600; min-width: 80px; }
        input[type="range"] { flex: 1; }
        .value { min-width: 60px; text-align: right; font-weight: bold; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-push { background: #e74c3c; color: white; }
        .btn-soft { background: #27ae60; color: white; }
        .btn-hard { background: #f39c12; color: white; }
        .status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
        }
        .force-bar {
            width: 150px;
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        .force-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c);
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info">
        <h1>阻抗控制可视化</h1>
        <p><strong>弹簧-质量-阻尼模型</strong></p>
        <div class="formula">
            F = M·ẍ + B·ẋ + K·(x - xd)
        </div>
        <p style="font-size: 13px; color: #666;">
            • <strong>M</strong>：虚拟质量（惯性）<br>
            • <strong>B</strong>：虚拟阻尼（能量耗散）<br>
            • <strong>K</strong>：虚拟刚度（弹性）<br>
            <br>
            点击"推机器人"施加外力，观察不同阻抗参数下的响应
        </p>
    </div>

    <div class="status">
        <div><strong>接触力</strong></div>
        <div class="force-bar"><div id="forceBar" class="force-fill" style="width: 0%"></div></div>
        <div id="forceValue" style="text-align: center; margin-top: 5px;">0 N</div>
        <div style="margin-top: 15px;">
            <div><strong>位移</strong>: <span id="displacement">0.00</span> m</div>
            <div><strong>速度</strong>: <span id="velocity">0.00</span> m/s</div>
        </div>
    </div>

    <div id="controls">
        <div style="text-align: center; font-weight: bold; color: #333; margin-bottom: 5px;">
            虚拟阻抗参数调节
        </div>
        <div class="control-group">
            <span class="control-label">刚度 K</span>
            <input type="range" id="stiffness" min="100" max="5000" value="1000" step="100">
            <span class="value" id="k-value">1000</span>
        </div>
        <div class="control-group">
            <span class="control-label">阻尼 B</span>
            <input type="range" id="damping" min="10" max="500" value="100" step="10">
            <span class="value" id="b-value">100</span>
        </div>
        <div class="control-group">
            <span class="control-label">质量 M</span>
            <input type="range" id="mass" min="1" max="50" value="10" step="1">
            <span class="value" id="m-value">10</span>
        </div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-push" onclick="applyForce()">👋 推机器人</button>
            <button class="btn-soft" onclick="setPreset('soft')">☁️ 软顺应</button>
            <button class="btn-hard" onclick="setPreset('hard')">🧱 硬阻抗</button>
            <button class="btn-push" onclick="resetSim()" style="background: #95a5a6;">↺ 重置</button>
        </div>
    </div>

    <script>
        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 20, 100);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 地板
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI/2;
        floor.position.y = -2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 目标位置指示（绿色）
        const targetGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const targetMat = new THREE.MeshBasicMaterial({ color: 0x27ae60, transparent: true, opacity: 0.5 });
        const targetSphere = new THREE.Mesh(targetGeo, targetMat);
        targetSphere.position.set(0, 1, 0);
        scene.add(targetSphere);

        // 弹簧可视化
        const springGroup = new THREE.Group();
        scene.add(springGroup);

        function createSpring(length, compressed) {
            springGroup.clear();
            const coils = 10;
            const radius = 0.3;
            const points = [];
            
            for (let i = 0; i <= coils * 10; i++) {
                const t = i / (coils * 10);
                const angle = t * coils * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = t * length;
                points.push(new THREE.Vector3(x, y, z));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: compressed ? 0xe74c3c : 0xf39c12,
                linewidth: 3
            });
            const line = new THREE.Line(geometry, material);
            springGroup.add(line);
            springGroup.position.set(-2, 1, 0);
        }

        // 机器人臂
        const robotGroup = new THREE.Group();
        scene.add(robotGroup);

        // 基座
        const baseGeo = new THREE.CylinderGeometry(0.5, 0.8, 1, 32);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x34495e, metalness: 0.7, roughness: 0.3 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -1.5;
        base.castShadow = true;
        robotGroup.add(base);

        // 连杆
        const linkGeo = new THREE.BoxGeometry(0.3, 3, 0.3);
        const linkMat = new THREE.MeshStandardMaterial({ color: 0x3498db, metalness: 0.6, roughness: 0.4 });
        const link = new THREE.Mesh(linkGeo, linkMat);
        link.position.y = 0;
        link.castShadow = true;
        robotGroup.add(link);

        // 末端执行器
        const eeGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const eeMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c, emissive: 0xe74c3c, emissiveIntensity: 0.3 });
        const endEffector = new THREE.Mesh(eeGeo, eeMat);
        endEffector.position.y = 1.5;
        endEffector.castShadow = true;
        robotGroup.add(endEffector);

        // 阻尼器可视化
        const damperGroup = new THREE.Group();
        damperGroup.position.set(2, 1, 0);
        scene.add(damperGroup);

        const damperCyl = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.2, 2, 16),
            new THREE.MeshStandardMaterial({ color: 0x95a5a6, metalness: 0.8 })
        );
        damperGroup.add(damperCyl);

        const damperPiston = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.1, 1.5, 16),
            new THREE.MeshStandardMaterial({ color: 0x7f8c8d, metalness: 0.9 })
        );
        damperPiston.position.y = 0.5;
        damperGroup.add(damperPiston);

        // 物理参数
        let K = 1000;  // 刚度
        let B = 100;   // 阻尼
        let M = 10;    // 质量
        let position = 0;  // 位移
        let velocity = 0;  // 速度
        let targetPos = 0;
        let externalForce = 0;
        let isPushing = false;

        // UI事件
        document.getElementById('stiffness').addEventListener('input', (e) => {
            K = parseFloat(e.target.value);
            document.getElementById('k-value').textContent = K;
        });
        document.getElementById('damping').addEventListener('input', (e) => {
            B = parseFloat(e.target.value);
            document.getElementById('b-value').textContent = B;
        });
        document.getElementById('mass').addEventListener('input', (e) => {
            M = parseFloat(e.target.value);
            document.getElementById('m-value').textContent = M;
        });

        function setPreset(type) {
            if (type === 'soft') {
                K = 200; B = 50; M = 5;
            } else {
                K = 4000; B = 400; M = 20;
            }
            document.getElementById('stiffness').value = K;
            document.getElementById('damping').value = B;
            document.getElementById('mass').value = M;
            document.getElementById('k-value').textContent = K;
            document.getElementById('b-value').textContent = B;
            document.getElementById('m-value').textContent = M;
        }

        function applyForce() {
            externalForce = 500 + Math.random() * 500;
            isPushing = true;
            setTimeout(() => { isPushing = false; }, 200);
        }

        function resetSim() {
            position = 0;
            velocity = 0;
            externalForce = 0;
        }

        // 仿真循环
        function simulate() {
            const dt = 0.016;

            // 阻抗控制方程：F = M·ẍ + B·ẋ + K·(x - xd)
            const springForce = -K * (position - targetPos);
            const damperForce = -B * velocity;
            const totalForce = springForce + damperForce + externalForce;

            const acceleration = totalForce / M;
            velocity += acceleration * dt;
            position += velocity * dt;

            // 衰减外力
            externalForce *= 0.95;

            // 更新可视化
            robotGroup.position.x = position;
            endEffector.material.emissiveIntensity = 0.3 + Math.abs(velocity) * 0.1;

            // 弹簧
            const springLength = Math.max(0.5, 3 - position);
            createSpring(springLength, position > 0.1);

            // 阻尼器活塞
            damperPiston.position.y = 0.5 + velocity * 0.01;
            damperPiston.scale.y = 1 + Math.abs(velocity) * 0.001;

            // 力显示
            const contactForce = Math.abs(springForce + damperForce);
            const forcePercent = Math.min(100, contactForce / 2000 * 100);
            document.getElementById('forceBar').style.width = forcePercent + '%';
            document.getElementById('forceValue').textContent = contactForce.toFixed(0) + ' N';
            document.getElementById('displacement').textContent = position.toFixed(2);
            document.getElementById('velocity').textContent = velocity.toFixed(2);
        }

        function animate() {
            requestAnimationFrame(animate);
            simulate();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
