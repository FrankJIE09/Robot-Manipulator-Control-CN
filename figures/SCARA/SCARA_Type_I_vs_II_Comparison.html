<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I 型 vs II 型 SCARA 机器人对比</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; }
        canvas { display: block; }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        .controls-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            color: white;
            pointer-events: auto;
            max-width: 300px;
        }
        .label-tag {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <h1 class="text-2xl font-bold">SCARA 机器人构型对比</h1>
    <p class="mt-2 opacity-80">鼠标拖拽旋转视角 | 滚轮缩放</p>
</div>

<div class="controls-panel">
    <h3 class="font-bold border-b border-gray-500 mb-2 pb-1">实时控制</h3>
    <div class="mb-3">
        <label class="block text-xs uppercase tracking-widest text-gray-400">旋转角度 (J1/J2)</label>
        <input type="range" id="rotationSlider" min="-1.5" max="1.5" step="0.01" value="0" class="w-full">
    </div>
    <div class="mb-3">
        <label class="block text-xs uppercase tracking-widest text-gray-400">Z轴行程 (J3)</label>
        <input type="range" id="zSlider" min="0" max="2" step="0.01" value="0.5" class="w-full">
    </div>
    <div class="text-xs text-gray-300">
        <div class="flex items-center gap-2 mb-1">
            <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
            <span>I 型：Z轴在末端 (轻负载)</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 bg-orange-500 rounded-full"></span>
            <span>II 型：Z轴在基座 (重负载)</span>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, clock;
    let type1Robot = {}, type2Robot = {};
    let isMouseDown = false;
    let mouseX = 0, mouseY = 0;
    let targetRotationX = 0.3, targetRotationY = -0.5;
    let currentRotationX = 0.3, currentRotationY = -0.5;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground
        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
        scene.add(grid);

        // --- Build Type I SCARA (Left) ---
        type1Robot.group = new THREE.Group();
        type1Robot.group.position.x = -4;
        scene.add(type1Robot.group);

        // Base
        const base1Geom = new THREE.BoxGeometry(1.5, 0.5, 1.5);
        const base1Mat = new THREE.MeshPhongMaterial({ color: 0x444444 });
        const base1 = new THREE.Mesh(base1Geom, base1Mat);
        base1.position.y = 0.25;
        type1Robot.group.add(base1);

        // Pillar (Fixed)
        const pillar1 = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 3), base1Mat);
        pillar1.position.y = 1.5 + 0.25;
        type1Robot.group.add(pillar1);

        // Link 1
        type1Robot.link1 = new THREE.Group();
        type1Robot.link1.position.y = 3;
        type1Robot.group.add(type1Robot.link1);
        
        const arm1_1 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.6), new THREE.MeshPhongMaterial({ color: 0x3b82f6 }));
        arm1_1.position.x = 1;
        type1Robot.link1.add(arm1_1);

        // Link 2
        type1Robot.link2 = new THREE.Group();
        type1Robot.link2.position.x = 2;
        type1Robot.link1.add(type1Robot.link2);

        const arm1_2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.35, 0.5), new THREE.MeshPhongMaterial({ color: 0x60a5fa }));
        arm1_2.position.x = 0.75;
        type1Robot.link2.add(arm1_2);

        // Z-Axis Shaft (at the end)
        type1Robot.zShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2), new THREE.MeshPhongMaterial({ color: 0xcccccc }));
        type1Robot.zShaft.position.set(1.5, 0, 0);
        type1Robot.link2.add(type1Robot.zShaft);

        // --- Build Type II SCARA (Right) ---
        type2Robot.group = new THREE.Group();
        type2Robot.group.position.x = 4;
        scene.add(type2Robot.group);

        // Heavy Base
        const base2Geom = new THREE.BoxGeometry(2, 0.6, 2);
        const base2Mat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const base2 = new THREE.Mesh(base2Geom, base2Mat);
        base2.position.y = 0.3;
        type2Robot.group.add(base2);

        // Long Z-Axis Track
        const track2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 5, 0.6), base2Mat);
        track2.position.y = 2.5;
        type2Robot.group.add(track2);

        // Moving Carriage
        type2Robot.carriage = new THREE.Group();
        type2Robot.group.add(type2Robot.carriage);

        const carriageMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshPhongMaterial({ color: 0x777777 }));
        type2Robot.carriage.add(carriageMesh);

        // Link 1 (Mounted on carriage)
        type2Robot.link1 = new THREE.Group();
        type2Robot.carriage.add(type2Robot.link1);

        const arm2_1 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.6, 0.8), new THREE.MeshPhongMaterial({ color: 0xf97316 }));
        arm2_1.position.x = 1.25;
        type2Robot.link1.add(arm2_1);

        // Link 2
        type2Robot.link2 = new THREE.Group();
        type2Robot.link2.position.x = 2.5;
        type2Robot.link1.add(type2Robot.link2);

        const arm2_2 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 0.7), new THREE.MeshPhongMaterial({ color: 0xfb923c }));
        arm2_2.position.x = 1;
        type2Robot.link2.add(arm2_2);

        // Fixed Tool at the end
        const tool2 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5), new THREE.MeshPhongMaterial({ color: 0xcccccc }));
        tool2.position.set(2, -0.25, 0);
        type2Robot.link2.add(tool2);

        // Events
        window.addEventListener('resize', onWindowResize, false);
        document.addEventListener('mousedown', () => isMouseDown = true);
        document.addEventListener('mouseup', () => isMouseDown = false);
        document.addEventListener('mousemove', onMouseMove);
        
        animate();
    }

    function onMouseMove(event) {
        if (isMouseDown) {
            targetRotationY += event.movementX * 0.01;
            targetRotationX += event.movementY * 0.01;
            targetRotationX = Math.max(-0.5, Math.min(1.2, targetRotationX));
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Smooth camera movement
        currentRotationX += (targetRotationX - currentRotationX) * 0.1;
        currentRotationY += (targetRotationY - currentRotationY) * 0.1;

        const radius = 15;
        camera.position.x = radius * Math.sin(currentRotationY) * Math.cos(currentRotationX);
        camera.position.y = radius * Math.sin(currentRotationX);
        camera.position.z = radius * Math.cos(currentRotationY) * Math.cos(currentRotationX);
        camera.lookAt(0, 2, 0);

        // Get values from UI
        const rotVal = parseFloat(document.getElementById('rotationSlider').value);
        const zVal = parseFloat(document.getElementById('zSlider').value);

        // Update Type 1
        type1Robot.link1.rotation.y = rotVal;
        type1Robot.link2.rotation.y = rotVal * 1.5;
        type1Robot.zShaft.position.y = -zVal; // J3 moves only the shaft

        // Update Type 2
        type2Robot.carriage.position.y = 1.5 + zVal; // J3 moves the entire arm structure
        type2Robot.link1.rotation.y = rotVal;
        type2Robot.link2.rotation.y = rotVal * 1.5;

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>

</body>
</html>
